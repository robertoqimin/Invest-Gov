{% include 'partials/head.html' %}
<body>
  {% include 'partials/header.html' %}
  <main class="page-shell auth-layout">
    <section class="auth-card">
      <span class="hero-kicker">Área administrativa</span>
      <h1>Criar um novo administrador.</h1>
      <p class="page-copy">Disponível apenas para contas admin, com o mesmo padrão visual das demais páginas.</p>

      <form
        id="registerForm"
        class="stack-form"
        data-auth-endpoint="/registeradmin"
        data-auth-redirect="/login"
        data-auth-role="admin"
      >
        <div class="field">
          <label for="username">Usuário</label>
          <input id="username" type="text" name="username" placeholder="Nome do administrador" required>
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" name="email" placeholder="admin@empresa.com" required>
        </div>
        <div class="field">
          <label for="password">Senha</label>
          <input id="password" type="password" name="password" placeholder="Defina uma senha" required>
        </div>
        <button type="submit" class="button-full">Cadastrar admin</button>
      </form>

      <p id="message" class="message"></p>
      <div class="actions-row">
        <a href="{{ url_for('home_blueprint.admin') }}" class="button button-secondary">Voltar ao painel</a>
      </div>
    </section>
  </main>

  <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>
</html>
