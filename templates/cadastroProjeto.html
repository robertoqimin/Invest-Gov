{%include 'partials/head.html' %}
<body>
  {% include 'partials/header.html' %}
  <main class="page-shell">
    {% if current_user.is_authenticated %}
      <section class="form-card">
        <span class="hero-kicker">Publicação</span>
        <h1 class="page-title">Cadastrar novo projeto</h1>
        <p class="page-copy">Versão legada atualizada para seguir o mesmo visual moderno da aplicação.</p>

        <form id="cadastro-form" class="stack-form" data-project-form="true" data-redirect-to-project="true">
          <div class="split-form">
            <div class="field">
              <label for="empresa">Nome do projeto</label>
              <input type="text" id="empresa" name="empresa" required />
            </div>
            <div class="field">
              <label for="produto">Categoria do projeto</label>
              <input type="text" id="produto" name="produto" required />
            </div>
          </div>
          <div class="field">
            <label for="imagem">Imagem</label>
            <input type="text" id="imagem" name="imagem" required />
          </div>
          <div class="field">
            <label for="descricao">Descrição</label>
            <textarea id="descricao" name="descricao" rows="4" required></textarea>
          </div>
          <button type="submit">Cadastrar</button>
        </form>
      </section>
    {% else %}
      <section class="surface empty-state">
        <p class="project-description">Você precisa estar logado para cadastrar um projeto.</p>
      </section>
    {% endif %}
  </main>

  <script src="{{ url_for('static', filename='js/project-form.js') }}"></script>
</body>
</html>
