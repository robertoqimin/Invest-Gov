{% include 'partials/head.html' %}
<body>
  {% include 'partials/header.html' %}
  <main class="page-shell auth-layout">
    <section class="auth-card">
      <span class="hero-kicker">Criar conta</span>
      <h1>Cadastre-se para publicar e acompanhar projetos.</h1>
      <p class="page-copy">A nova interface foi pensada para deixar sua navegação mais clara desde o primeiro acesso.</p>

      <form
        id="registerForm"
        class="stack-form"
        data-auth-endpoint="/register"
        data-auth-redirect="/login"
      >
        <div class="field">
          <label for="username">Usuário</label>
          <input id="username" type="text" name="username" placeholder="Seu nome de usuário" required>
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" name="email" placeholder="voce@empresa.com" required>
        </div>
        <div class="field">
          <label for="password">Senha</label>
          <input id="password" type="password" name="password" placeholder="Crie uma senha segura" required>
        </div>
        <button type="submit" class="button-full">Cadastrar</button>
      </form>

      <p id="message" class="message"></p>
      <div class="actions-row">
        <a href="{{ url_for('auth.login_page') }}" class="button button-secondary">Já tenho conta</a>
      </div>
    </section>
  </main>

  <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>
</html>
