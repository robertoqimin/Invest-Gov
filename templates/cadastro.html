{% include 'partials/head.html' %}
<body>
  {% include 'partials/header.html' %}
  <main class="page-shell">
    {% if current_user.is_authenticated %}
      <section class="form-card">
        <h1 class="page-title">Cadastrar novo investimento</h1>
        <form id="cadastro-form" class="stack-form" data-project-form="true">
          <div class="field">
            <label for="empresa">Nome projeto</label>
            <input type="text" id="empresa" name="empresa" required />
          </div>
          <div class="field">
            <label for="produto">Produto</label>
            <input type="text" id="produto" name="produto" required />
          </div>
          <div class="field">
            <label for="imagem">Imagem</label>
            <input type="text" id="imagem" name="imagem" required />
          </div>
          <div class="field">
            <label for="descricao">Descrição do produto</label>
            <textarea id="descricao" name="descricao" rows="4" required></textarea>
          </div>
          <button type="submit">Cadastrar</button>
        </form>
      </section>
    {% else %}
      <section class="surface empty-state">
        <p class="project-description">Você precisa estar logado para cadastrar um projeto.</p>
      </section>
    {% endif %}
  </main>

  <script src="{{ url_for('static', filename='js/project-form.js') }}"></script>
</body>
</html>
