{% include 'partials/head.html' %}
<body>
  {% include 'partials/header.html' %}
  <main class="page-shell auth-layout">
    <section class="auth-card">
      <span class="hero-kicker">Cadastro</span>
      <h1>Criar usuário</h1>
      <form
        id="registerForm"
        class="stack-form"
        data-auth-endpoint="/register"
        data-auth-redirect="/"
      >
        <div class="field">
          <label for="username">Usuário</label>
          <input id="username" type="text" name="username" placeholder="Usuário" required>
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" name="email" placeholder="Email" required>
        </div>
        <div class="field">
          <label for="password">Senha</label>
          <input id="password" type="password" name="password" placeholder="Senha" required>
        </div>
        <div class="field">
          <label for="role">Role</label>
          <select name="role" id="role">
            <option value="user" selected>Usuário</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <button type="submit" class="button-full">Cadastrar</button>
      </form>
      <p id="message" class="message"></p>
      <a href="{{ url_for('auth.login_page') }}" class="button button-secondary">Login</a>
    </section>
  </main>

  <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>
</html>
