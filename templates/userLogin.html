{% include 'partials/head.html' %}
<body>
  {% include 'partials/header.html' %}
  <main class="page-shell auth-layout">
    <section class="auth-card">
      <span class="hero-kicker">Acesso à plataforma</span>
      <h1>Entre para acompanhar projetos e investidores.</h1>
      <p class="page-copy">Use sua conta para favoritar, comentar e publicar novas oportunidades.</p>

      <form
        id="loginForm"
        class="stack-form"
        data-auth-endpoint="/login"
        data-auth-redirect="/"
      >
        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" name="email" placeholder="voce@empresa.com" required>
        </div>
        <div class="field">
          <label for="password">Senha</label>
          <input id="password" type="password" name="password" placeholder="Sua senha" required>
        </div>
        <button type="submit" class="button-full">Entrar</button>
      </form>

      <p id="message" class="message"></p>
      <div class="actions-row">
        <a href="/register" class="button button-secondary">Criar conta</a>
      </div>
    </section>
  </main>

    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>
</html>
