{% include 'partials/head.html' %}
<body>
  <main class="page-shell auth-layout">
    <section class="auth-card">
      <span class="hero-kicker">Admin</span>
      <h1>Login administrativo</h1>
      <p class="page-copy">Acesse o painel para gerenciar usuários e projetos.</p>
      <form
        id="adminLoginForm"
        class="stack-form"
        data-auth-endpoint="/login"
        data-auth-redirect="/admintestes"
      >
        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" name="email" placeholder="Email" required>
        </div>
        <div class="field">
          <label for="password">Senha</label>
          <input id="password" type="password" name="password" placeholder="Senha" required>
        </div>
        <button type="submit" class="button-full">Entrar</button>
      </form>
      <p id="message" class="message"></p>
    </section>
  </main>

  <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>
</html>
