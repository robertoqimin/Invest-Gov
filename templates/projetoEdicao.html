{%include 'partials/head.html' %}
<body>
    {% include 'partials/header.html' %}
    <main class="page-shell">
      <section class="form-card">
        <span class="hero-kicker">Edição</span>
        <h1 class="page-title">Editar projeto</h1>
        <p class="page-copy">Atualize os dados e mantenha sua apresentação alinhada ao novo padrão visual.</p>

        <form method="POST" class="stack-form">
          <div class="field">
            <label for="title">Nome do projeto</label>
            <input type="text" id="title" name="title" value="{{ projeto.title }}" required>
          </div>

          <div class="split-form">
            <div class="field">
              <label for="category">Categoria</label>
              <input type="text" id="category" name="category" value="{{ projeto.category }}">
            </div>
            <div class="field">
              <label for="location">Imagem</label>
              <input type="text" id="location" name="location" value="{{ projeto.location }}">
            </div>
          </div>

          <div class="field">
            <label for="description">Descrição</label>
            <textarea id="description" name="description" rows="5" required>{{ projeto.description }}</textarea>
          </div>

          <div class="actions-row">
            <button type="submit">Salvar alterações</button>
            <a href="{{ url_for('projects.view_project', id=projeto.id) }}" class="button button-secondary">Cancelar</a>
          </div>
        </form>
      </section>
    </main>
</body>
</html>
